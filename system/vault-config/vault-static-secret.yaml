# Syncs credentials from Vault KV v2 to a Kubernetes Secret that the
# kubernetes-agent reads via standard secretKeyRef env vars.
# VSO automatically restarts the agent Deployment when secret data changes.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: kubernetes-agent-secret
  namespace: openshift-gitops
spec:
  vaultAuthRef: vault-auth
  type: kv-v2
  mount: secret
  path: argo-rollouts/kubernetes-agent
  hmacSecretData: true
  refreshAfter: 300s
  destination:
    create: true
    name: kubernetes-agent
  rolloutRestartTargets:
  - kind: Deployment
    name: kubernetes-agent
