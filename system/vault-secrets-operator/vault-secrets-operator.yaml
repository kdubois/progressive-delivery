# HashiCorp Vault Secrets Operator — Red Hat-certified, installed via OperatorHub.
# Syncs secrets from Vault KV to Kubernetes Secrets using declarative CRDs.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: vault-secrets-operator
  namespace: openshift-operators
spec:
  channel: stable
  name: vault-secrets-operator
  source: certified-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
