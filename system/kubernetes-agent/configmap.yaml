apiVersion: v1
kind: ConfigMap
metadata:
  name: kubernetes-agent-config
  namespace: openshift-gitops
data:
  # Default model configuration (qwen3-14b via LiteLLM)
  #OPENAI_MODEL: deepseek-r1-distill-qwen-14b
  #OPENAI_BASE_URL: https://litellm-prod.apps.maas.redhatworkshops.io/v1
  OPENAI_MODEL: Qwen3.6-35B-A3B
  OPENAI_BASE_URL: litemaas.rhoai.rh-aiservices-bu.com/v1

  # Remediation model configuration
  #REM_BASE_URL: "https://api.openai.com/v1"
  #REM_MODEL: "gpt-4o"

  REM_MODEL: Qwen3.6-35B-A3B
  REM_BASE_URL: litemaas.rhoai.rh-aiservices-bu.com/v1
  
  # Gemini model configuration
  GEMINI_MODEL: "gemini-2.5-flash"
  
  # Profile selection - set to 'prod,openai' or 'prod,gemini'
  # Add ',vault' to read credentials from Vault instead of the K8s Secret
  QUARKUS_PROFILE: "prod,openai,vault"

  # Vault URL
  VAULT_ADDR: "http://vault.openshift-gitops.svc.cluster.local:8200"