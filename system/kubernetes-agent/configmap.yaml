apiVersion: v1
kind: ConfigMap
metadata:
  name: kubernetes-agent-config
  namespace: openshift-gitops
data:
  # Default model configuration - TEMPORARILY using real OpenAI due to qwen3-14b OAuth issues
  # TODO: Revert to qwen3-14b once OAuth authentication is fixed
  OPENAI_BASE_URL: "https://api.openai.com/v1"
  OPENAI_MODEL: "gpt-4o-mini"
  
  # RemediationAgent-specific model (uses real OpenAI GPT-4o to avoid XML wrapping)
  REMEDIATION_BASE_URL: "https://api.openai.com/v1"
  REMEDIATION_MODEL: "gpt-4o"
  
  # Gemini model configuration
  GEMINI_MODEL: "gemini-2.5-flash"
  
  # Profile selection - set to 'prod,openai' or 'prod,gemini'
  QUARKUS_PROFILE: "prod,openai"