apiVersion: v1
kind: ConfigMap
metadata:
  name: kubernetes-agent-config
  namespace: openshift-gitops
data:
  # Default model configuration (qwen3-14b via LiteLLM)
  OPENAI_BASE_URL: "https://litellm-prod.apps.maas.redhatworkshops.io/v1"
  OPENAI_MODEL: "qwen3-14b"

  #OPENAI_BASE_URL: "https://api.openai.com/v1"
  #OPENAI_MODEL: "gpt-4o-mini"

  # Remediation model configuration (GPT-4 for better JSON formatting)
  # Uses separate API endpoint to avoid Qwen's Unicode quote issues
  REM_BASE_URL: "https://api.openai.com/v1"
  REM_MODEL: "gpt-4o-mini"
  
  # Gemini model configuration
  GEMINI_MODEL: "gemini-2.5-flash"
  
  # Profile selection - set to 'prod,openai' or 'prod,gemini'
  QUARKUS_PROFILE: "prod,openai"