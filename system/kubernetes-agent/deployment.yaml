apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-agent
  namespace: openshift-gitops
  labels:
    app: kubernetes-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubernetes-agent
  template:
    metadata:
      labels:
        app: kubernetes-agent
    spec:
      serviceAccountName: kubernetes-agent
      containers:
        - name: agent
          image: quay.io/kevindubois/kubernetes-agent:latest
          imagePullPolicy: Always # change to IfNotPresent when using a fixed version
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          envFrom:
            # Load model configuration from ConfigMap
            - configMapRef:
                name: kubernetes-agent-config
          env:
            # Sensitive data from secrets
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kubernetes-agent
                  key: openai_api_key
                  optional: true
            - name: REMEDIATION_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kubernetes-agent
                  key: remediation_api_key
                  optional: true
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kubernetes-agent
                  key: google_api_key
                  optional: true
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kubernetes-agent
                  key: github_token
            - name: GOOGLE_CLOUD_PROJECT
              valueFrom:
                secretKeyRef:
                  name: kubernetes-agent
                  key: google_cloud_project
                  optional: true
            # Git Configuration
            - name: GIT_USERNAME
              value: "kubernetes-agent"
            - name: GIT_EMAIL
              value: "kubernetes-agent@csanchez.org"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /q/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /q/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always

