apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: openshift-gitops

resources:
  - rbac.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml

# Generate secret from secrets.env file (git-ignored, located in project root)
# Create secrets.env from environment variables:
#   ./generate-secrets.sh
# Or manually copy and edit:
#   cp secrets.env.example secrets.env
secretGenerator:
  - name: kubernetes-agent
    envs:
      - ../../secrets.env
    options:
      disableNameSuffixHash: true
