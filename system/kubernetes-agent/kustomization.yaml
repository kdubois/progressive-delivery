apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: openshift-gitops

resources:
  - rbac.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml

# Note: The kubernetes-agent secret must be created manually before deploying
# It is NOT included in this kustomization because it contains sensitive data
# See README.md for instructions on creating the secret
