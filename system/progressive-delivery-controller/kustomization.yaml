apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: openshift-gitops

resources:
  - rolloutmanager.yaml
  - cert-cm.yaml
  - namespace-role.yaml

patches:
  - path: rbac-patch.yaml
    target:
      kind: ClusterRole
      name: argo-rollouts
  # Use strategic merge patch to fix RolloutManager bug
  # RolloutManager creates 'metricPlugins' but should be 'metricProviderPlugins'
  - path: argo-rollouts-configmap.yaml
    target:
      kind: ConfigMap
      name: argo-rollouts-config
    options:
      allowNameChange: true
