# Vault operator — installed via the community operators catalog on OpenShift.
# Sync wave -1 ensures this lands before the Vault CR in wave 0.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: vault-operator
  namespace: openshift-operators  # must stay in openshift-operators, not openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  channel: stable
  installPlanApproval: Automatic
  name: vault-operator
  source: community-operators
  sourceNamespace: openshift-marketplace
