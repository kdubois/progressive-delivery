# RBAC for the Vault pod's ServiceAccount.
# The operator creates the 'vault' ServiceAccount; this gives it the
# permissions it needs to read its own secret (for unseal key storage)
# and to validate Kubernetes tokens during the auth method exchange.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-auth-delegator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
- kind: ServiceAccount
  name: vault
  namespace: openshift-gitops
