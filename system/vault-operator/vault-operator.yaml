# Vault operator — installed via the community operators catalog on OpenShift.
# Lives in its own Argo CD application (system/vault-operator) so it syncs
# and installs its CRDs before the system/vault application attempts to apply
# the Vault CR.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: vault-operator
  namespace: openshift-operators
spec:
  channel: stable
  installPlanApproval: Automatic
  name: vault-operator
  source: community-operators
  sourceNamespace: openshift-marketplace
