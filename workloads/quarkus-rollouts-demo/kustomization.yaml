apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: quarkus-demo

resources:
- namespace.yaml
- service-canary.yaml
- service-stable.yaml
- rollout.yaml
- analysistemplate-ai-agent.yaml
- route.yaml
- plugin-rbac.yaml
- rbac.yaml

patches:
  - target:
      version: v1alpha1
      group: argoproj.io
      kind: Rollout
      name: quarkus-demo
    patch: |-
      apiVersion: argoproj.io/v1alpha1
      kind: Rollout
      metadata:
        name: quarkus-demo
      spec:
        template:
          spec:
            containers:
            - name: quarkus-demo
              image: quay.io/kevindubois/argo-rollouts-quarkus-demo:1.0.7
              imagePullPolicy: Always
              ports:
              - name: http
                containerPort: 8080
                protocol: TCP
              env:
              - name: SCENARIO_MODE
                value: "success"
              - name: ROLLOUT_NAME
                value: "quarkus-demo"
              - name: ROLLOUT_NAMESPACE
                value: "quarkus-demo"
              # Bug scenario flags (set to true to enable)
              - name: ENABLE_MEMORY_LEAK
                value: "true"
              - name: ENABLE_CONNECTION_LEAK
                value: "false"
              - name: ENABLE_CPU_SPIKE
                value: "false"

