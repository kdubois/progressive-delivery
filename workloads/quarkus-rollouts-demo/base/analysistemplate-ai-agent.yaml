apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: ai-analysis-agent
  namespace: quarkus-demo
spec:
  args:
  - name: namespace
  - name: canary-pod
  - name: stable-pod-label
    value: app=quarkus-demo,role=stable
  - name: canary-pod-label
    value: app=quarkus-demo,role=canary
  metrics:
    - name: ai-analysis
      # Allow up to 2 failures before aborting (handles transient issues during pod startup)
      failureLimit: 2
      # Take 3 measurements with 30s between each
      count: 3
      interval: 30s
      # Wait 30s after canary pods start before first analysis
      initialDelay: 30s
      provider:
        plugin:
          argoproj-labs/metric-ai:
            # Required: Agent URL (must be explicitly configured)
            agentUrl: http://kubernetes-agent:8080
            # Required: Pod selectors for agent to fetch logs
            stableLabel: role=stable
            canaryLabel: role=canary
            # Optional: Create GitHub issues on failures
            githubUrl: https://github.com/kdubois/argo-rollouts-quarkus-demo
            baseBranch: main
            # Optional: Additional context for AI analysis
            extraPrompt: "Ignore color changes. Consider LoadBalancerNegNotReady and 'Pod has no IP' warnings as temporary conditions during pod startup."

